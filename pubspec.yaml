name: nova_rise_app
description: "SchoolApp MVP mobile client."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.12
  cloud_functions: ^5.6.2
  cupertino_icons: ^1.0.8
  file_picker: ^9.2.3
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  firebase_storage: ^12.4.10
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  cached_network_image: ^3.4.1
  firebase_messaging: ^15.2.10
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
