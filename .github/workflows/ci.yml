name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: flutter analyze
      - working-directory: apps/mobile
        run: flutter test

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: backend/functions
        run: npm ci
      - working-directory: backend/functions
        run: npm run build
